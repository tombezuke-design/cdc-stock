<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลังสินค้ามินิมอล</title>
    <!-- Tailwind CSS สำหรับ GUI ที่สวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 สำหรับหน้าต่างแจ้งเตือนและแบบฟอร์ม -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center md:justify-between pb-6 mb-8 border-b border-slate-200 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Stock Management</h1>
                <p class="text-sm text-slate-500 mt-1">ระบบบริหารคลังสินค้าและบันทึกประวัติอัตโนมัติ</p>
            </div>
            <!-- ปุ่มเมนูทำรายการ -->
            <div class="flex flex-wrap gap-2">
                <button onclick="openTransactionModal('เบิกเข้า')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-sm transition dynamic-btn text-sm flex items-center gap-1">
                    ➕ เบิกเข้า (In)
                </button>
                <button onclick="openTransactionModal('ขายออก')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-sm transition dynamic-btn text-sm flex items-center gap-1">
                    💰 ขายออก (Sale)
                </button>
                <button onclick="openTransactionModal('เบิกออก')" class="bg-amber-600 hover:bg-amber-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-sm transition dynamic-btn text-sm flex items-center gap-1">
                    📤 เบิกออก (Out)
                </button>
            </div>
        </header>

        <!-- สรุปภาพรวมย่อยๆ -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">รายการสินค้าทั้งหมด</p>
                <p id="total-items" class="text-2xl font-bold text-slate-800 mt-1">0 รายการ</p>
            </div>
        </div>

        <!-- ตารางแสดงสินค้าคงเหลือ -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between">
                <h2 class="font-semibold text-lg text-slate-900">รายการสินค้าคงเหลือปัจจุบัน</h2>
                <button onclick="loadStockData()" class="text-slate-400 hover:text-slate-600 transition">
                    🔄 รีเฟรช
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/70 border-b border-slate-100 text-slate-500 text-xs font-semibold uppercase">
                            <th class="py-3 px-6">รหัสสินค้า</th>
                            <th class="py-3 px-6">ชื่อสินค้า</th>
                            <th class="py-3 px-6">ล็อต/วันหมดอายุ</th>
                            <th class="py-3 px-6 text-right">คงเหลือ</th>
                            <th class="py-3 px-6">หน่วยนับ</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr>
                            <td colspan="5" class="py-8 text-center text-slate-400">กำลังโหลดข้อมูลสต็อก...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // เปลี่ยนตรงนี้เป็น URL ของ Google Web App ที่ได้จากการ Deploy Script
        const API_URL = "https://script.google.com/macros/s/AKfycbzg86onuNc0r9UZaQRPDaMywpVlmq1-DGuAeKdcuaV3hGLYuZCK_pK4nRwcSWe4d5ikoA/exec"; 
        let globalStockData = [];

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function loadStockData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                globalStockData = data;
                
                document.getElementById('total-items').innerText = `${data.length} รายการ`;
                
                const tbody = document.getElementById('stock-table-body');
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="py-8 text-center text-slate-400">ไม่มีข้อมูลสินค้าในระบบ</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50/50 transition";
                    
                    let rawExpiry = item["ล็อต/วันหมดอายุ"] ? item["ล็อต/วันหมดอายุ"].toString() : "";
                    let cleanExpiry = rawExpiry.includes('T') ? rawExpiry.split('T')[0] : rawExpiry;

                    const expiryDate = new Date(cleanExpiry);
                    const today = new Date();
                    const diffTime = expiryDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    let expiryClass = "text-slate-600";
                    if (cleanExpiry === "ไม่มี") {
                        expiryClass = "text-slate-400 font-medium bg-slate-100 px-2 py-0.5 rounded";
                    } else if (diffDays <= 0) {
                        expiryClass = "text-rose-600 font-bold bg-rose-50 px-2 py-0.5 rounded";
                    } else if (diffDays <= 60) {
                        expiryClass = "text-amber-600 font-semibold bg-amber-50 px-2 py-0.5 rounded";
                    }

                    const qtyClass = item.คงเหลือ <= 5 ? "text-rose-600 font-bold" : "text-slate-700 font-semibold";
                    
                    row.innerHTML = `
                        <td class="py-4 px-6 font-mono text-slate-600 text-xs">${item.รหัสสินค้า}</td>
                        <td class="py-4 px-6 font-medium text-slate-900">${item.ชื่อสินค้า}</td>
                        <td class="py-4 px-6 text-xs ${expiryClass}">${cleanExpiry || '-'}</td>
                        <td class="py-4 px-6 text-right ${qtyClass}">${Number(item.คงเหลือ).toLocaleString()}</td>
                        <td class="py-4 px-6 text-slate-400 text-xs">${item.หน่วยนับ}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error("Error loading data:", error);
                Swal.fire('ผิดพลาด', 'ไม่สามารถดึงข้อมูลสต็อกได้', 'error');
            }
        }

        let cartData = []; 

        function openTransactionModal(actionType) {
            cartData = []; 
            
            const uniqueProducts = [];
            const map = new Map();
            for (const item of globalStockData) {
                if(!map.has(item.รหัสสินค้า)){
                    map.set(item.รหัสสินค้า, true);
                    uniqueProducts.push({ code: item.รหัสสินค้า, name: item.ชื่อสินค้า });
                }
            }

            let productOptionsHtml = uniqueProducts.map(p => 
                `<option value="${p.code}">${p.name}</option>`
            ).join('');

            Swal.fire({
                title: `<span class="text-xl font-bold">ทำรายการ: ${actionType}</span>`,
                html: `
                    <div class="text-left space-y-4 mt-4 text-sm">
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-200 space-y-3">
                            <p class="font-semibold text-slate-700">➕ เลือกสินค้าเพิ่มลงตะกร้า</p>
                            <div>
                                <label class="block text-slate-500 mb-1">เลือกสินค้า</label>
                                <select id="swal-code" onchange="updateExpiryAndUnitOptions('${actionType}')" class="w-full border border-slate-200 rounded-xl p-2.5 bg-white">
                                    <option value="">-- เลือกสินค้า --</option>
                                    ${productOptionsHtml}
                                </select>
                            </div>
                            <div>
                                <label class="block text-slate-500 mb-1">ล็อต / วันหมดอายุ</label>
                                <div id="expiry-input-container">
                                    <select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-100 text-slate-400" disabled>
                                        <option value="">-- กรุณาเลือกสินค้าก่อน --</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-slate-500 mb-1">หน่วยนับ</label>
                                    <input id="swal-unit" type="text" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-100 text-slate-500 cursor-not-allowed" readonly>
                                </div>
                                <div>
                                    <label class="block text-slate-500 mb-1">จำนวน</label>
                                    <input id="swal-qty" type="number" min="1" class="w-full border border-slate-200 rounded-xl p-2.5" placeholder="ระบุจำนวน">
                                </div>
                            </div>
                            <!-- 🌟 แก้ไขจุดแจ้งเตือนของปุ่มใน SweetAlert -->
                            <div id="cart-error-msg" class="text-rose-500 text-xs hidden font-medium"></div>
                            <button type="button" onclick="addToCart('${actionType}')" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 rounded-lg transition text-xs">
                                📥 เพิ่มรายการนี้ลงตะกร้า
                            </button>
                        </div>

                        <div>
                            <p class="font-semibold text-slate-700 mb-1.5">🛒 รายการในตะกร้าปัจจุบัน</p>
                            <div class="border border-slate-200 rounded-xl overflow-hidden max-h-[200px] overflow-y-auto bg-white">
                                <table class="w-full text-left border-collapse text-xs">
                                    <thead>
                                        <tr class="bg-slate-100 text-slate-600 font-medium border-b border-slate-200">
                                            <th class="p-2">สินค้า</th>
                                            <th class="p-2">ล็อต/หมดอายุ</th>
                                            <th class="p-2 text-right">จำนวน</th>
                                            <th class="p-2 text-center">จัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody id="cart-table-body">
                                        <tr><td colspan="4" class="p-4 text-center text-slate-400">ยังไม่มีสินค้าในตะกร้า</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div>
                            <label class="block text-slate-500 mb-1">หมายเหตุรวม (เช่น ชื่อคนเบิก เลขที่บิล)</label>
                            <input id="swal-note" type="text" class="w-full border border-slate-200 rounded-xl p-2.5" placeholder="ระบุหมายเหตุเพิ่มเติม">
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: '🚀 ส่งบันทึกทุกรายการร่วมกัน',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: actionType === 'เบิกเข้า' ? '#059669' : actionType === 'ขายออก' ? '#2563eb' : '#d97706',
                customClass: {
                    popup: 'rounded-2xl max-w-lg',
                    confirmButton: 'rounded-xl px-4 py-2 text-sm font-medium',
                    cancelButton: 'rounded-xl px-4 py-2 text-sm font-medium'
                },
                preConfirm: () => {
                    if (cartData.length === 0) {
                        Swal.showValidationMessage('กรุณาเพิ่มสินค้าลงตะกร้าอย่างน้อย 1 รายการก่อนส่งบันทึก');
                        return false;
                    }
                    return {
                        note: document.getElementById('swal-note').value,
                        items: cartData
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    submitCartTransaction(actionType, result.value.items, result.value.note);
                }
            });
        }

        function updateExpiryAndUnitOptions(actionType) {
            const code = document.getElementById('swal-code').value;
            const container = document.getElementById('expiry-input-container');
            const unitInput = document.getElementById('swal-unit');
            
            if(!code) {
                container.innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-100 text-slate-400" disabled><option value="">-- เลือกสินค้าก่อน --</option></select>`;
                unitInput.value = "";
                return;
            }

            const matchProduct = globalStockData.find(item => item.รหัสสินค้า === code);
            unitInput.value = matchProduct ? (matchProduct.หน่วยนับ || "ชิ้น") : "ชิ้น";

            if(actionType === 'เบิกเข้า') {
                container.innerHTML = `<input id="swal-expiry" type="date" class="w-full border border-slate-200 rounded-xl p-2.5 bg-white">`;
            } else {
                const lots = globalStockData
                    .filter(item => item.รหัสสินค้า === code && item.คงเหลือ > 0)
                    .sort((a, b) => new Date(a["ล็อต/วันหมดอายุ"]) - new Date(b["ล็อต/วันหมดอายุ"]));
                    
                if(lots.length === 0) {
                    container.innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-rose-50 text-rose-500 font-medium" disabled><option value="">❌ ไม่มีสต็อกคงเหลือ</option></select>`;
                    return;
                }

                let optionsHtml = lots.map(item => {
                    let rawExp = item["ล็อต/วันหมดอายุ"] ? item["ล็อต/วันหมดอายุ"].toString() : "";
                    let cleanExp = rawExp.includes('T') ? rawExp.split('T')[0] : rawExp;
                    return `<option value="${cleanExp}">${cleanExp} (คงเหลือ: ${item.คงเหลือ})</option>`;
                }).join('');
                
                container.innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-white">${optionsHtml}</select>`;
            }
        }

        function addToCart(actionType) {
            const codeSelect = document.getElementById('swal-code');
            const errorMsg = document.getElementById('cart-error-msg');
            errorMsg.classList.add('hidden'); // ล้างสถานะข้อผิดพลาดเก่า

            const code = codeSelect.value;
            const productName = codeSelect.options[codeSelect.selectedIndex].text;
            const expiryInput = document.getElementById('swal-expiry').value;
            const qty = parseInt(document.getElementById('swal-qty').value);
            const unit = document.getElementById('swal-unit').value;

            // 🌟 ปรับปรุงการแจ้งเตือนเงื่อนไขข้อผิดพลาดบนช่องย่อยใน SweetAlert ให้เสถียร
            if(!code || !expiryInput || !qty || qty <= 0) {
                errorMsg.innerText = "⚠️ กรุณาเลือกสินค้า วันหมดอายุ และระบุจำนวนให้ถูกต้อง";
                errorMsg.classList.remove('hidden');
                return;
            }

            let finalExpiry = expiryInput;
            if (finalExpiry && finalExpiry !== "ไม่มี") {
                const dateObj = new Date(finalExpiry);
                if (!isNaN(dateObj.getTime())) {
                    const yyyy = dateObj.getFullYear();
                    const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                    const dd = String(dateObj.getDate()).padStart(2, '0');
                    finalExpiry = `${yyyy}-${mm}-${dd}`;
                }
            }

            const existingIndex = cartData.findIndex(item => item.code === code && item.expiry === finalExpiry);
            if(existingIndex > -1) {
                cartData[existingIndex].qty += qty;
            } else {
                cartData.push({ code, productName, expiry: finalExpiry, qty, unit });
            }

            // 🌟 เคลียร์ค่าช่องป้อนข้อมูลสินค้าและจำนวนหลังจากเพิ่มเสร็จ เพื่อให้เลือกชิ้นต่อไปได้สะดวก
            codeSelect.value = "";
            document.getElementById('swal-qty').value = "";
            document.getElementById('swal-unit').value = "";
            document.getElementById('expiry-input-container').innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-100 text-slate-400" disabled><option value="">-- กรุณาเลือกสินค้าก่อน --</option></select>`;
            
            renderCartTable();
        }

        function removeFromCart(index) {
            cartData.splice(index, 1);
            renderCartTable();
        }

        function renderCartTable() {
            const tbody = document.getElementById('cart-table-body');
            if(cartData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-400">ยังไม่มีสินค้าในตะกร้า</td></tr>`;
                return;
            }
            
            tbody.innerHTML = cartData.map((item, index) => `
                <tr class="border-b border-slate-100 hover:bg-slate-50">
                    <td class="p-2 font-medium text-slate-800">${item.productName}</td>
                    <td class="p-2 text-slate-500 font-mono text-[11px]">${item.expiry}</td>
                    <td class="p-2 text-right font-bold text-slate-700">${item.qty} ${item.unit}</td>
                    <td class="p-2 text-center">
                        <button type="button" onclick="removeFromCart(${index})" class="text-rose-500 hover:text-rose-700 font-bold">❌</button>
                    </td>
                </tr>
            `).join('');
        }

        async function submitCartTransaction(type, items, note) {
            const confirmButton = Swal.getConfirmButton();
            const cancelButton = Swal.getCancelButton();
            if (confirmButton) confirmButton.disabled = true;
            if (cancelButton) cancelButton.disabled = true;

            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: `กำลังประมวลผลสต็อกทั้งหมด ${items.length} รายการ`,
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // 🌟 ปรับปรุงวิธีการส่ง Fetch ให้รองรับ Cross-Origin (CORS) สำหรับส่งข้อมูลแบบกล่องตะกร้าขนาดใหญ่
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // บังคับให้ข้ามผ่านระบบล็อกความปลอดภัยของเบราว์เซอร์
                    headers: { 
                        'Content-Type': 'text/plain' // เปลี่ยนเป็น text/plain เพื่อป้องกันสิทธิ์การ Preflight ของเบราว์เซอร์
                    },
                    body: JSON.stringify({ type, note, batchMode: true, items })
                });

                // หน่วงเวลาเล็กน้อยให้ระบบหลังบ้านจัดการเขียนแถวข้อมูลลง Sheets ให้เสร็จสิ้น
                setTimeout(() => {
                    Swal.fire({
                        title: 'สำเร็จ!',
                        text: 'บันทึกสต็อกและประวัติลง Logs ทุกรายการเรียบร้อยแล้ว',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    loadStockData(); // รีเฟรชหน้า GUI ดึงสต็อกอัปเดตล่าสุดมาโชว์
                }, 1500);

            } catch (error) {
                console.error("Error submitting cart:", error);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลไปยังเซิร์ฟเวอร์หลังบ้านได้ กรุณาลองใหม่อีกครั้ง', 'error');
            }
        }
        window.onload = loadStockData;
    </script>
</body>
</html>
