<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลังสินค้ามินิมอล</title>
    <!-- Tailwind CSS สำหรับ GUI ที่สวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 สำหรับหน้าต่างแจ้งเตือนและแบบฟอร์ม -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Google -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center md:justify-between pb-6 mb-8 border-b border-slate-200 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Stock Management</h1>
                <p class="text-sm text-slate-500 mt-1">ระบบบริหารคลังสินค้าและบันทึกประวัติอัตโนมัติ</p>
            </div>
            <!-- ปุ่มเมนูทำรายการ -->
            <div class="flex flex-wrap gap-2">
                <button onclick="openTransactionModal('เบิกเข้า')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-sm transition dynamic-btn text-sm flex items-center gap-1">
                    ➕ เบิกเข้า (In)
                </button>
                <button onclick="openTransactionModal('ขายออก')" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-sm transition dynamic-btn text-sm flex items-center gap-1">
                    💰 ขายออก (Sale)
                </button>
                <button onclick="openTransactionModal('เบิกออก')" class="bg-amber-600 hover:bg-amber-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-sm transition dynamic-btn text-sm flex items-center gap-1">
                    📤 เบิกออก (Out)
                </button>
            </div>
        </header>

        <!-- สรุปภาพรวมย่อยๆ -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">รายการสินค้าทั้งหมด</p>
                <p id="total-items" class="text-2xl font-bold text-slate-800 mt-1">0 รายการ</p>
            </div>
        </div>

        <!-- ตารางแสดงสินค้าคงเหลือ -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between">
                <h2 class="font-semibold text-lg text-slate-900">รายการสินค้าคงเหลือปัจจุบัน</h2>
                <button onclick="loadStockData()" class="text-slate-400 hover:text-slate-600 transition">
                    🔄 รีเฟรช
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                   <!-- แทนที่แท็บ <thead> และ <tbody> เดิมในไฟล์ เพื่อเพิ่มคอลัมน์วันหมดอายุบน GUI -->
                    <thead>
                        <tr class="bg-slate-50/70 border-b border-slate-100 text-slate-500 text-xs font-semibold uppercase">
                            <th class="py-3 px-6">รหัสสินค้า</th>
                            <th class="py-3 px-6">ชื่อสินค้า</th>
                            <th class="py-3 px-6">ล็อต/วันหมดอายุ</th>
                            <th class="py-3 px-6 text-right">คงเหลือ</th>
                            <th class="py-3 px-6">หน่วยนับ</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr>
                            <td colspan="4" class="py-8 text-center text-slate-400">กำลังโหลดข้อมูลสต็อก...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // เปลี่ยนตรงนี้เป็น URL ของ Google Web App ที่ได้จากการ Deploy Script
        const API_URL = "https://script.google.com/macros/s/AKfycbw_xKOohrZK_T-UnwHRx3ujwvys46ANtKs-fxZsLVlzu-ManU22hp95UeY8QoTjRhZy_g/exec"; 
        let globalStockData = [];

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function loadStockData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                globalStockData = data;
                
                document.getElementById('total-items').innerText = `${data.length} รายการ`;
                
                const tbody = document.getElementById('stock-table-body');
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-slate-400">ไม่มีข้อมูลสินค้าในระบบ</td></tr>`;
                    return;
                }

               data.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50/50 transition";
    
                // 🌟 1. ตัดรูปแบบเวลา ISO ออกให้เหลือเฉพาะปฏิทิน YYYY-MM-DD
                    let rawExpiry = item["ล็อต/วันหมดอายุ"] ? item["ล็อต/วันหมดอายุ"].toString() : "";
                    let cleanExpiry = rawExpiry.includes('T') ? rawExpiry.split('T')[0] : rawExpiry;

                // 2. คำนวณแถบสีเตือนวันหมดอายุ (หมดอายุแล้ว=แดง / ใกล้หมดอายุใน 60 วัน=ส้ม)
                    const expiryDate = new Date(cleanExpiry);
                    const today = new Date();
                    const diffTime = expiryDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
                    let expiryClass = "text-slate-600";
                    if (cleanExpiry === "ไม่มี") {
                        expiryClass = "text-slate-400 font-medium bg-slate-100 px-2 py-0.5 rounded";
                    } else if (diffDays <= 0) {
                        expiryClass = "text-rose-600 font-bold bg-rose-50 px-2 py-0.5 rounded";
                    } else if (diffDays <= 60) {
                        expiryClass = "text-amber-600 font-semibold bg-amber-50 px-2 py-0.5 rounded";
                    }

                    // 3. ปรับสีตัวเลขสต็อกต่ำ
                    const qtyClass = item.คงเหลือ <= 5 ? "text-rose-600 font-bold" : "text-slate-700 font-semibold";
    
                    // 4. แสดงผลข้อมูลเวอร์ชันสะอาดตา
                    row.innerHTML = `
                        <td class="py-4 px-6 font-mono text-slate-600 text-xs">${item.รหัสสินค้า}</td>
                        <td class="py-4 px-6 font-medium text-slate-900">${item.ชื่อสินค้า}</td>
                        <td class="py-4 px-6 text-xs ${expiryClass}">${cleanExpiry || '-'}</td>
                        <td class="py-4 px-6 text-right ${qtyClass}">${Number(item.คงเหลือ).toLocaleString()}</td>
                        <td class="py-4 px-6 text-slate-400 text-xs">${item.หน่วยนับ}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error("Error loading data:", error);
                Swal.fire('ผิดพลาด', 'ไม่สามารถดึงข้อมูลสต็อกได้', 'error');
            }
        }

        // เปิดป็อปอัพกรอกข้อมูลทำรายการ (ใช้ SweetAlert2 เพื่อความสวยงามและจบในตัว)
        function openTransactionModal(actionType) {
    // กรองเอาเฉพาะรายชื่อสินค้าแบบไม่ซ้ำกัน เพื่อแสดงใน Select สินค้าตัวแรก
    const uniqueProducts = [];
    const map = new Map();
    for (const item of globalStockData) {
        if(!map.has(item.รหัสสินค้า)){
            map.set(item.รหัสสินค้า, true);
            uniqueProducts.push({ code: item.รหัสสินค้า, name: item.ชื่อสินค้า });
        }
    }

    let productOptionsHtml = uniqueProducts.map(p => 
        `<option value="${p.code}">${p.name}</option>`
    ).join('');

    Swal.fire({
        title: `<span class="text-xl font-bold">ทำรายการ: ${actionType}</span>`,
        html: `
            <div class="text-left space-y-3 mt-4 text-sm">
                <div>
                    <label class="block text-slate-500 mb-1">เลือกสินค้า</label>
                    <select id="swal-code" onchange="updateExpiryAndUnitOptions('${actionType}')" class="w-full border border-slate-200 rounded-xl p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">-- เลือกสินค้า --</option>
                        ${productOptionsHtml}
                    </select>
                </div>
                <div>
                    <label class="block text-slate-500 mb-1">ล็อต / วันหมดอายุ</label>
                        <div id="expiry-input-container">
                            <select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-50 text-slate-400" disabled>
                                <option value="">-- กรุณาเลือกสินค้าก่อน --</option>
                            </select>
                        </div>
                </div>
                <!-- 🌟 เพิ่มช่องหน่วยนับแบบล็อกการแก้ไข (Readonly) -->
                <div>
                    <label class="block text-slate-500 mb-1">หน่วยนับ</label>
                    <input id="swal-unit" type="text" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-100 text-slate-500 font-medium cursor-not-allowed" placeholder="ดึงอัตโนมัติจากระบบ" readonly>
                </div>
                <div>
                    <label class="block text-slate-500 mb-1">จำนวน</label>
                    <input id="swal-qty" type="number" min="1" class="w-full border border-slate-200 rounded-xl p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="ระบุจำนวน">
                </div>
                <div>
                    <label class="block text-slate-500 mb-1">หมายเหตุ (ถ้ามี)</label>
                    <input id="swal-note" type="text" class="w-full border border-slate-200 rounded-xl p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="เช่น ชื่อคนเบิก เลขที่บิล">
                </div>
            </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'บันทึกรายการ',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: actionType === 'เบิกเข้า' ? '#059669' : actionType === 'ขายออก' ? '#2563eb' : '#d97706',
        customClass: {
            popup: 'rounded-2xl',
            confirmButton: 'rounded-xl px-4 py-2 text-sm font-medium',
            cancelButton: 'rounded-xl px-4 py-2 text-sm font-medium'
        },
        preConfirm: () => {
            return {
                code: document.getElementById('swal-code').value,
                expiry: document.getElementById('swal-expiry').value,
                qty: document.getElementById('swal-qty').value,
                note: document.getElementById('swal-note').value
            }
        }
    }).then((result) => {
    if (result.isConfirmed) {
        const data = result.value;
        if(!data.code || !data.expiry || !data.qty || data.qty <= 0) {
            Swal.fire('กรอกข้อมูลไม่ครบ', 'กรุณาระบุข้อมูลสต็อก วันหมดอายุ และจำนวนสินค้าให้ถูกต้อง', 'warning');
            return;
        }

        // 🌟 จุดแก้ไขสำคัญ: ดักจับแปลงฟอร์แมตวันที่เป็น ปี-เดือน-วัน ก่อนส่งไปหลังบ้าน
        let finalExpiry = data.expiry;
        if (finalExpiry && finalExpiry !== "ไม่มี") {
            const dateObj = new Date(finalExpiry);
            if (!isNaN(dateObj.getTime())) {
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                finalExpiry = `${yyyy}-${mm}-${dd}`;
            }
        }
        
        // ส่งข้อมูลที่แปลงฟอร์แมตวันที่เรียบร้อยแล้วไปทำงาน
        submitTransaction(actionType, data.code, finalExpiry, data.qty, data.note);
    }
});
}

function updateExpiryOptions(actionType) {
    const code = document.getElementById('swal-code').value;
    const container = document.getElementById('expiry-input-container');
    
    if(!code) {
        container.innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-slate-50 text-slate-400" disabled><option value="">-- กรุณาเลือกสินค้าก่อน --</option></select>`;
        return;
    }

    if(actionType === 'เบิกเข้า') {
        // 🌟 แก้ไข: บังคับให้สร้าง Input type="date" ขึ้นมาบน GUI ทันทีเมื่อกดเลือกสินค้า เพื่อให้ระบุวันหมดอายุของล็อตที่จะเบิกเข้า
        container.innerHTML = `<input id="swal-expiry" type="date" class="w-full border border-slate-200 rounded-xl p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">`;
    } else {
        // ขายออก/เบิกออก: ดึงเฉพาะล็อตวันหมดอายุที่มีของคงเหลืออยู่มาเรียงแสดง (ล็อตหมดอายุก่อนขึ้นแรกสุด - FEFO)
        const lots = globalStockData
            .filter(item => item.รหัสสินค้า === code && item.คงเหลือ > 0)
            .sort((a, b) => new Date(a["ล็อต/วันหมดอายุ"]) - new Date(b["ล็อต/วันหมดอายุ"]));
            
        if(lots.length === 0) {
            container.innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 bg-rose-50 text-rose-500 font-medium" disabled><option value="">❌ ไม่มีสินค้าล็อตคงเหลือในระบบ</option></select>`;
            return;
        }

        let optionsHtml = lots.map(item => {
            // ดึงรูปแบบวันที่มาตัดเวลาออกเพื่อโชว์ในตัวเลือกแบบสะอาดตา
            let rawExp = item["ล็อต/วันหมดอายุ"] ? item["ล็อต/วันหมดอายุ"].toString() : "";
            let cleanExp = rawExp.includes('T') ? rawExp.split('T')[0] : rawExp;
            return `<option value="${cleanExp}">${cleanExp} (คงเหลือ: ${item.คงเหลือ})</option>`;
        }).join('');
        
        container.innerHTML = `<select id="swal-expiry" class="w-full border border-slate-200 rounded-xl p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">${optionsHtml}</select>`;
    }
}

        // ส่งข้อมูลไปยัง Google App Script API
       // ส่งข้อมูลไปยัง Google App Script API (เวอร์ชันเพิ่มระบบป้องกันการกดซ้ำ)
// 🌟 เวอร์ชันแก้ไข: เพิ่มการรับและส่งค่า expiry ไปหลังบ้าน
async function submitTransaction(type, code, expiry, qty, note) {
    // 1. ดึงปุ่มใน SweetAlert ออกมาแล้วสั่งปิดใช้งาน (Disable) ทันที ป้องกันการคลิกซ้ำ
    const confirmButton = Swal.getConfirmButton();
    const cancelButton = Swal.getCancelButton();
    if (confirmButton) confirmButton.disabled = true;
    if (cancelButton) cancelButton.disabled = true;

    // 2. แสดงสถานะกำลังบันทึกข้อมูล และบล็อกหน้าจอทั้งหมดไว้
    Swal.fire({
        title: 'กำลังบันทึกข้อมูล...',
        text: 'กรุณารอสักครู่ ระบบกำลังอัปเดตสต็อกตามล็อต',
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => { 
            Swal.showLoading(); 
        }
    });

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            // 🌟 จุดแก้ไขสำคัญ: เพิ่ม expiry เข้าไปใน JSON.stringify เพื่อส่งไปให้ doPost
            body: JSON.stringify({ type, code, expiry, qty, note })
        });

        // หน่วงเวลาเล็กน้อยเพื่อให้ชัวร์ว่า Google Sheets ทำงานเสร็จสิ้น จากนั้นแจ้งเตือนและรีเฟรชสต็อก
        setTimeout(() => {
            Swal.fire({
                title: 'สำเร็จ!',
                text: 'ทำรายการและบันทึกประวัติลง Log เรียบร้อยแล้ว',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
            loadStockData(); // ดึงข้อมูลใหม่ล่าสุดมาแสดงผล
        }, 1000);

    } catch (error) {
        console.error("Error submitting:", error);
        Swal.fire({
            title: 'เกิดข้อผิดพลาด',
            text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง',
            icon: 'error'
        });
    }
}

        // โหลดข้อมูลเมื่อเปิดหน้าเวปครั้งแรก
        window.onload = loadStockData;
    </script>
</body>
</html>
